name: Build Minecraft Server Fat Jar (with Enhanced Transformers)

on:
  workflow_dispatch:
    inputs:
      server_jar_url:
        description: 'Minecraft Server Jar 下载链接 (非官方)'
        required: true
        default: 'https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar'


jobs:
  build-fat-jar:
    runs-on: ubuntu-latest
    name: Build Fat Jar with Transformers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      # 下载并解压外层 JAR
      - name: Download and extract server.jar
        shell: bash
        run: |
          mkdir -p work
          cd work
          JAR_URL="${{ github.event.inputs.server_jar_url }}"
          if [ -z "$JAR_URL" ]; then
            echo "Error: No JAR URL provided"
            exit 1
          fi
          wget -O server.jar "$JAR_URL"
          mkdir extracted
          cd extracted
          jar xf ../server.jar
          # 当前目录为 work/extracted

      # 解析 classpath-joined 和 main-class，并复制依赖到 fatjar/libs（使用 cp -t）
      - name: Parse and copy dependencies (using cp -t)
        id: parse
        shell: bash
        run: |
          # 不使用 set -e，改为手动检查错误
          cd work/extracted

          # 读取主类
          MAIN_CLASS=$(cat META-INF/main-class | tr -d '\n\r')
          echo "main_class=$MAIN_CLASS" >> $GITHUB_OUTPUT
          echo "Main class: $MAIN_CLASS"

          # 读取 classpath-joined（分号分隔），生成依赖 jar 列表（相对于 META-INF 目录）
          CP_FILE="META-INF/classpath-joined"
          if [ ! -f "$CP_FILE" ]; then
            echo "Error: classpath-joined not found"
            exit 1
          fi
          # 去除 Windows 换行符，按分号分割，并过滤空行
          cp_entries=$(cat "$CP_FILE" | tr -d '\r' | tr ';' '\n' | sed '/^$/d')
          echo "Raw classpath entries:"
          echo "$cp_entries"
          echo "$cp_entries" > dependencies.txt

          # 创建目标目录 fatjar/libs (位于仓库根目录)
          mkdir -p ../../fatjar/libs

          # 收集所有存在的源文件路径（加上 META-INF/ 前缀）
          source_files=()
          missing_files=()
          while IFS= read -r relpath; do
            src_path="META-INF/$relpath"
            if [ -f "$src_path" ]; then
              source_files+=("$src_path")
            else
              missing_files+=("$src_path")
            fi
          done < dependencies.txt

          echo "Total entries: ${#source_files[@]} found, ${#missing_files[@]} missing"
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "Warning: The following files were not found:"
            printf '%s\n' "${missing_files[@]}"
          fi

          if [ ${#source_files[@]} -eq 0 ]; then
            echo "Error: No jar files found to copy"
            exit 1
          fi

          # 使用 cp -t 批量复制所有找到的文件到目标目录
          echo "Copying ${#source_files[@]} files to ../../fatjar/libs/ ..."
          cp -v -t ../../fatjar/libs/ "${source_files[@]}"
          if [ $? -ne 0 ]; then
            echo "Error: Failed to copy some files"
            exit 1
          fi

          echo "Successfully copied ${#source_files[@]} jar files to fatjar/libs"

      - name: Generate final pom.xml from template (using printf for dependencies, and write closing tags in yml)
        shell: bash
        run: |
          cd fatjar

          # 检查模板是否存在
          if [ ! -f "../pom-template.xml" ]; then
            echo "Error: pom-template.xml not found in repository root"
            exit 1
          fi

          # 复制模板（模板以 <dependencies> 结尾，不含闭合标签）
          cp ../pom-template.xml pom.xml

          # 获取 libs 目录下所有 jar 文件
          shopt -s nullglob
          jar_files=(libs/*.jar)
          if [ ${#jar_files[@]} -eq 0 ]; then
            echo "Error: No jar files in libs directory"
            exit 1
          fi
          echo "Found ${#jar_files[@]} jar files:"
          ls -l libs/

          # 使用 printf 将依赖项追加到 pom.xml
          for jar in "${jar_files[@]}"; do
            filename=$(basename "$jar")
            artifactId="dep-${filename%.*}"
            printf '        <dependency>\n' >> pom.xml
            printf '            <groupId>com.example.deps</groupId>\n' >> pom.xml
            printf '            <artifactId>%s</artifactId>\n' "$artifactId" >> pom.xml
            printf '            <version>1.0</version>\n' >> pom.xml
            printf '            <scope>system</scope>\n' >> pom.xml
            printf '            <systemPath>${project.basedir}/libs/%s</systemPath>\n' "$filename" >> pom.xml
            printf '        </dependency>\n' >> pom.xml
          done

          # 追加 </dependencies> 和 </project>
          printf '%s\n' '    </dependencies>' >> pom.xml
          printf '%s\n' '</project>' >> pom.xml

          # 替换主类占位符
          sed -i "s|MAIN_CLASS_PLACEHOLDER|${{ steps.parse.outputs.main_class }}|g" pom.xml

          # 调试输出
          echo "=== Final pom.xml (first 20 lines) ==="
          head -200 pom.xml
          echo "=== Last 10 lines ==="
          tail -10 pom.xml

      # 执行 Maven 打包
      - name: Build fat jar with Maven
        run: |
          cd fatjar
          mvn clean package

      # 定位生成的 Fat JAR
      - name: Locate fat jar
        id: locate
        run: |
          JAR_PATH=/home/runner/work/github_action/github_action/fatjar/target/minecraft-server-fat-1.0-shaded.jar
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT

      # 上传生成的 Fat JAR
      - name: Upload Fat Jar
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-fatjar.zip
          path: ${{ steps.locate.outputs.jar_path }}
          if-no-files-found: error

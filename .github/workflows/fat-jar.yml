name: Build Minecraft Server Fat Jar (with Enhanced Transformers)

on:
  workflow_dispatch:
    inputs:
      server_jar_url:
        description: 'Minecraft Server Jar 下载链接 (非官方)'
        required: true
        default: 'https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar'


jobs:
  build-fat-jar:
    runs-on: ubuntu-latest
    name: Build Fat Jar with Transformers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      # 下载并解压外层 JAR
      - name: Download and extract server.jar
        shell: bash
        run: |
          mkdir -p work
          cd work
          JAR_URL="${{ github.event.inputs.server_jar_url }}"
          if [ -z "$JAR_URL" ]; then
            echo "Error: No JAR URL provided"
            exit 1
          fi
          wget -O server.jar "$JAR_URL"
          mkdir extracted
          cd extracted
          jar xf ../server.jar
          # 当前目录为 work/extracted

      # 解析 classpath-joined 和 main-class，并复制依赖到 fatjar/libs（使用 cp -t）
      - name: Parse and copy dependencies (using cp -t)
        id: parse
        shell: bash
        run: |
          # 不使用 set -e，改为手动检查错误
          cd work/extracted

          # 读取主类
          MAIN_CLASS=$(cat META-INF/main-class | tr -d '\n\r')
          echo "main_class=$MAIN_CLASS" >> $GITHUB_OUTPUT
          echo "Main class: $MAIN_CLASS"

          # 读取 classpath-joined（分号分隔），生成依赖 jar 列表（相对于 META-INF 目录）
          CP_FILE="META-INF/classpath-joined"
          if [ ! -f "$CP_FILE" ]; then
            echo "Error: classpath-joined not found"
            exit 1
          fi
          # 去除 Windows 换行符，按分号分割，并过滤空行
          cp_entries=$(cat "$CP_FILE" | tr -d '\r' | tr ';' '\n' | sed '/^$/d')
          echo "Raw classpath entries:"
          echo "$cp_entries"
          echo "$cp_entries" > dependencies.txt

          # 创建目标目录 fatjar/libs (位于仓库根目录)
          mkdir -p ../../fatjar/libs

          # 收集所有存在的源文件路径（加上 META-INF/ 前缀）
          source_files=()
          missing_files=()
          while IFS= read -r relpath; do
            src_path="META-INF/$relpath"
            if [ -f "$src_path" ]; then
              source_files+=("$src_path")
            else
              missing_files+=("$src_path")
            fi
          done < dependencies.txt

          echo "Total entries: ${#source_files[@]} found, ${#missing_files[@]} missing"
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "Warning: The following files were not found:"
            printf '%s\n' "${missing_files[@]}"
          fi

          if [ ${#source_files[@]} -eq 0 ]; then
            echo "Error: No jar files found to copy"
            exit 1
          fi

          # 使用 cp -t 批量复制所有找到的文件到目标目录
          echo "Copying ${#source_files[@]} files to ../../fatjar/libs/ ..."
          cp -v -t ../../fatjar/libs/ "${source_files[@]}"
          if [ $? -ne 0 ]; then
            echo "Error: Failed to copy some files"
            exit 1
          fi

          echo "Successfully copied ${#source_files[@]} jar files to fatjar/libs"

      # 生成 Maven 项目 pom.xml（基于 fatjar/libs 下的实际文件）- 使用 printf
      - name: Generate pom.xml with transformers (using printf)
        shell: bash
        run: |
          set -e
          cd fatjar
          mkdir -p src/main/java  # 占位

          # 获取 libs 目录下所有 jar 文件
          shopt -s nullglob
          jar_files=(libs/*.jar)
          if [ ${#jar_files[@]} -eq 0 ]; then
            echo "Error: No jar files in libs directory"
            exit 1
          fi
          echo "Found ${#jar_files[@]} jar files:"
          ls -l libs/

          # 使用 printf 创建 pom.xml（逐行写入，避免 heredoc 缩进问题）
          # 先清空文件
          > pom.xml

          # XML 声明和 project 开始
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' >> pom.xml
          printf '%s\n' '<project xmlns="http://maven.apache.org/POM/4.0.0"' >> pom.xml
          printf '%s\n' '         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"' >> pom.xml
          printf '%s\n' '         xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">' >> pom.xml
          printf '%s\n' '    <modelVersion>4.0.0</modelVersion>' >> pom.xml
          printf '%s\n' '' >> pom.xml
          printf '%s\n' '    <groupId>com.example</groupId>' >> pom.xml
          printf '%s\n' '    <artifactId>minecraft-server-fat</artifactId>' >> pom.xml
          printf '%s\n' '    <version>1.0</version>' >> pom.xml
          printf '%s\n' '    <packaging>jar</packaging>' >> pom.xml
          printf '%s\n' '' >> pom.xml
          printf '%s\n' '    <properties>' >> pom.xml
          printf '%s\n' '        <maven.compiler.source>21</maven.compiler.source>' >> pom.xml
          printf '%s\n' '        <maven.compiler.target>21</maven.compiler.target>' >> pom.xml
          printf '%s\n' '        <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>' >> pom.xml
          printf '%s\n' '    </properties>' >> pom.xml
          printf '%s\n' '' >> pom.xml
          printf '%s\n' '    <build>' >> pom.xml
          printf '%s\n' '        <plugins>' >> pom.xml
          printf '%s\n' '            <plugin>' >> pom.xml
          printf '%s\n' '                <groupId>org.apache.maven.plugins</groupId>' >> pom.xml
          printf '%s\n' '                <artifactId>maven-shade-plugin</artifactId>' >> pom.xml
          printf '%s\n' '                <version>3.5.0</version>' >> pom.xml
          printf '%s\n' '                <executions>' >> pom.xml
          printf '%s\n' '                    <execution>' >> pom.xml
          printf '%s\n' '                        <phase>package</phase>' >> pom.xml
          printf '%s\n' '                        <goals>' >> pom.xml
          printf '%s\n' '                            <goal>shade</goal>' >> pom.xml
          printf '%s\n' '                        </goals>' >> pom.xml
          printf '%s\n' '                        <configuration>' >> pom.xml
          printf '%s\n' '                            <createDependencyReducedPom>false</createDependencyReducedPom>' >> pom.xml
          printf '%s\n' '                            <filters>' >> pom.xml
          printf '%s\n' '                                <filter>' >> pom.xml
          printf '%s\n' '                                    <artifact>*:*</artifact>' >> pom.xml
          printf '%s\n' '                                    <excludes>' >> pom.xml
          printf '%s\n' '                                        <exclude>META-INF/*.SF</exclude>' >> pom.xml
          printf '%s\n' '                                        <exclude>META-INF/*.DSA</exclude>' >> pom.xml
          printf '%s\n' '                                        <exclude>META-INF/*.RSA</exclude>' >> pom.xml
          printf '%s\n' '                                    </excludes>' >> pom.xml
          printf '%s\n' '                                </filter>' >> pom.xml
          printf '%s\n' '                            </filters>' >> pom.xml
          printf '%s\n' '                            <transformers>' >> pom.xml
          printf '%s\n' '                                <!-- 1. Log4j2 Plugin Cache Transformer -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.logging.log4j.maven.plugins.shade.transformer.Log4j2PluginCacheFileTransformer"/>' >> pom.xml
          printf '%s\n' '                                <!-- 2. Services Resource Transformer -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.ServicesResourceTransformer"/>' >> pom.xml
          printf '%s\n' '                                <!-- 3. Log4j2配置文件合并 -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.AppendingTransformer">' >> pom.xml
          printf '%s\n' '                                    <resource>log4j2.xml</resource>' >> pom.xml
          printf '%s\n' '                                </transformer>' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.AppendingTransformer">' >> pom.xml
          printf '%s\n' '                                    <resource>log4j2.properties</resource>' >> pom.xml
          printf '%s\n' '                                </transformer>' >> pom.xml
          printf '%s\n' '                                <!-- 4. Properties文件合并 -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.PropertiesResourceTransformer"/>' >> pom.xml
          printf '%s\n' '                                <!-- 5. XML文件合并 -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.XmlAppendingTransformer"/>' >> pom.xml
          printf '%s\n' '                                <!-- 6. Groovy资源合并 -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.GroovyResourceTransformer"/>' >> pom.xml
          printf '%s\n' '                                <!-- 7. Manifest设置主类 -->' >> pom.xml
          printf '%s\n' '                                <transformer implementation="org.apache.maven.plugins.shade.resource.ManifestResourceTransformer">' >> pom.xml
          printf '%s\n' '                                    <mainClass>MAIN_CLASS_PLACEHOLDER</mainClass>' >> pom.xml
          printf '%s\n' '                                </transformer>' >> pom.xml
          printf '%s\n' '                            </transformers>' >> pom.xml
          printf '%s\n' '                        </configuration>' >> pom.xml
          printf '%s\n' '                    </execution>' >> pom.xml
          printf '%s\n' '                </executions>' >> pom.xml
          printf '%s\n' '            </plugin>' >> pom.xml
          printf '%s\n' '        </plugins>' >> pom.xml
          printf '%s\n' '    </build>' >> pom.xml
          printf '%s\n' '' >> pom.xml
          printf '%s\n' '    <dependencies>' >> pom.xml

          # 为每个 jar 添加 system 依赖（使用 printf 插入变量）
          for jar in "${jar_files[@]}"; do
            filename=$(basename "$jar")
            artifactId="dep-${filename%.*}"
            # 写入依赖块，注意转义 $ 符号（写成 \$ 防止 shell 解释）
            printf '%s\n' "        <dependency>" >> pom.xml
            printf '%s\n' "            <groupId>com.example.deps</groupId>" >> pom.xml
            printf '%s\n' "            <artifactId>$artifactId</artifactId>" >> pom.xml
            printf '%s\n' "            <version>1.0</version>" >> pom.xml
            printf '%s\n' "            <scope>system</scope>" >> pom.xml
            printf '%s\n' "            <systemPath>\${project.basedir}/libs/$filename</systemPath>" >> pom.xml
            printf '%s\n' "        </dependency>" >> pom.xml
          done

          # 关闭 dependencies 和 project
          printf '%s\n' '    </dependencies>' >> pom.xml
          printf '%s\n' '</project>' >> pom.xml

          # 替换主类占位符
          sed -i "s|MAIN_CLASS_PLACEHOLDER|${{ steps.parse.outputs.main_class }}|g" pom.xml

          # 调试输出
          echo "=== Generated pom.xml (first 20 lines) ==="
          head -20 pom.xml
          echo "=== Last 10 lines ==="
          tail -10 pom.xml

      # 执行 Maven 打包
      - name: Build fat jar with Maven
        run: |
          cd fatjar
          mvn clean package

      # 定位生成的 Fat JAR
      - name: Locate fat jar
        id: locate
        run: |
          JAR_PATH=$(find fatjar/target -name "*.jar" ! -name "original-*.jar" | head -1)
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT

      # 上传生成的 Fat JAR
      - name: Upload Fat Jar
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-fatjar
          path: ${{ steps.locate.outputs.jar_path }}
          if-no-files-found: error

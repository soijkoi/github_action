name: Build Minecraft Fat-Jar (GradleUp Shadow)

on:
  workflow_dispatch:
    inputs:
      jar_url:
        description: 'Minecraft Server Jar 下载链接'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 2. 下载并解压元数据 (获取 CP 参数和主类)
      - name: Extract Metadata
        run: |
          mkdir -p build_temp
          curl -L "${{ github.event.inputs.jar_url }}" -o build_temp/server-origin.jar
          cd build_temp
          # 解压 META-INF 下的关键文件
          jar -xf server-origin.jar
          
          MAIN_CLASS=$(cat META-INF/main-class)
          echo "MAIN_CLASS=$MAIN_CLASS" >> $GITHUB_ENV

          # 解压所有依赖库和版本 Jar

          cd ..
      #    mkdir -p src/main/java
      # echo "public class Placeholder {}" > src/main/java/Placeholder.java

      # 3. 使用 com.gradleup.shadow 构建
      - name: Generate Build Script
        run: |
          cat <<EOF > build.gradle
          buildscript {
              repositories {
                  maven { url "https://plugins.gradle.org/m2/" }
              }
              dependencies {
                  classpath "com.gradleup.shadow:shadow-gradle-plugin:9.3.0"
              }
          }
          
          import com.github.jengelman.gradle.plugins.shadow.transformers.Log4j2PluginsCacheFileTransformer
          
          apply plugin: 'java'
          apply plugin: 'com.gradleup.shadow'
          
          repositories {
              mavenCentral()
          }
          
          // 定义一个自定义配置，用于显式声明要强制打包的本地JAR
          configurations {
              forcedJars
          }
          
          dependencies {
              // 将目标目录下的所有JAR添加到自定义配置中，而非 runtimeOnly
              forcedJars fileTree(dir: 'build_temp/META-INF/libraries', include: ['**/*.jar'])
              forcedJars fileTree(dir: 'build_temp/META-INF/versions', include: ['**/*.jar'])
          }
          
          shadowJar {
              // 强制只打包 forcedJars 配置中的依赖（解压合并）
              configurations = [project.configurations.forcedJars]
          
              archiveFileName = 'minecraft-server-fat.jar'
              manifest {
                  attributes 'Main-Class': '${{ env.MAIN_CLASS }}'
              }
          
              // 正确处理 Log4j2 二进制缓存合并
              transform(Log4j2PluginsCacheFileTransformer)
          
              // 合并 SPI 服务文件
              mergeServiceFiles()
          
              // 移除签名文件防止启动报错
              exclude 'META-INF/*.SF'
              exclude 'META-INF/*.DSA'
              exclude 'META-INF/*.RSA'
          }
          EOF
        
      - name: Build Fat Jar
        run: gradle shadowJar --no-daemon --warning-mode all

      # 4. 提供结果下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Fat-Jar
          path: build/libs/minecraft-server-fat.jar

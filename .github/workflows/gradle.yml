name: Build Minecraft Fat-Jar (GradleUp Shadow)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      jar_url:
        description: 'Minecraft Server Jar Download Link'
        required: true
        default: https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Extract Metadata
        run: |
          mkdir -p tmp
          cd tmp
          wget "https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar"
          jar -xf server.jar

      - name: Generate Build Script
        run: |
        
          cat <<EOF > build.gradle
            plugins {
                    id 'java'
                    id 'com.gradleup.shadow' version '9.3.1'
            }
            
            repositories {
                    mavenCentral()
            }
            
            dependencies {
                    implementation fileTree(dir: 'tmp/META-INF', include: ['**/*.jar'])
            }
            
            shadowJar {
                    archiveFileName = 'server-fat.jar'
                    manifest {
                            attributes 'Main-Class': $(cat tmp/META-INF/main-class)
                    }
                    duplicatesStrategy = 'include'
                    mergeServiceFiles()
                    transform(com.github.jengelman.gradle.plugins.shadow.transformers.Log4j2PluginsCacheFileTransformer)
                    transform(com.github.jengelman.gradle.plugins.shadow.transformers.PropertiesFileTransformer)
                    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
                    exclude 'META-INF/LICENSE*', 'META-INF/AL*', 'META-INF/LGPL*'
                    exclude 'META-INF/NOTICE*','META-INF/DEPENDENCIES'
                    exclude 'META-INF/**/pom.*'
            }
          EOF
        
      - name: Build Fat Jar
        run: gradle shadowJar --no-daemon --parallel --info

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Fat-Jar
          path: build/libs/server-fat.jar

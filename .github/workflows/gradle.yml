name: Build Minecraft Fat-Jar (GradleUp Shadow)

on:
  workflow_dispatch:
    inputs:
      jar_url:
        description: 'Minecraft Server Jar 下载链接'
        required: true
        default: 'https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 2. 下载并解压元数据 (获取 CP 参数和主类)
      - name: Extract Metadata
        run: |
          mkdir -p build_temp
          curl -L "${{ github.event.inputs.jar_url }}" -o build_temp/server-origin.jar
          cd build_temp
          # 解压 META-INF 下的关键文件
          jar -xf server-origin.jar
          
          MAIN_CLASS=$(cat META-INF/main-class)
          echo "MAIN_CLASS=$MAIN_CLASS" >> $GITHUB_ENV

          # 解压所有依赖库和版本 Jar

          cd ..
      #    mkdir -p src/main/java
      # echo "public class Placeholder {}" > src/main/java/Placeholder.java

      # 3. 使用 com.gradleup.shadow 构建
      - name: Generate Build Script
        run: |
          cat <<EOF > build.gradle
            plugins {
                id 'java'
                id 'com.gradleup.shadow' version '9.3.1'
            }
            
            repositories {
                mavenCentral()
            }
            
            dependencies {
            	implementation fileTree(dir: 'build_temp/META-INF', include: ['**/*.jar'])
            }
            
            shadowJar {
                transform(com.github.jengelman.gradle.plugins.shadow.transformers.Log4j2PluginsCacheFileTransformer)
                archiveFileName = 'minecraft-server-fat.jar'
                manifest {
                    attributes 'Main-Class': '${{ env.MAIN_CLASS }}'
                }
                mergeServiceFiles()
                exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
            }
          EOF
        
      - name: Build Fat Jar
        run: gradle shadowJar --no-daemon --warning-mode all

      # 4. 提供结果下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Fat-Jar
          path: build/libs/minecraft-server-fat.jar

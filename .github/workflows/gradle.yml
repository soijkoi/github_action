name: Build Minecraft Fat-Jar

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      jar_url:
        description: 'Minecraft Server Jar Download Link'
        required: true
        default: https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar
  
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Extract Metadata
        run: |
          mkdir build-tmp
          cd build-tmp
          curl -L "${{inputs.jar_url}}" -o server.jar
          jar -xf server.jar
          winget install --id Microsoft.VisualStudio.2022.BuildTools --source winget
        
      - name: Build Fat Jar
        run: gradle shadowJar --no-daemon --parallel
        
      - name: Build Native Image
        run: |
            mkdir native-tmp
            cd native-tmp
            native-image -jar build/libs/server-fat.jar --no-fallback --initialize-at-run-time=io.netty --enable-native-access ALL-UNNAMED --future-defaults=all -H:Preserve=module=ALL-UNNAMED -J-XX:-ExitOnOutOfMemoryError --enable-preview -esa --static-nolibc --enable-all-security-services --enable-https --enable-http -march=native -J-Xmx16g -Os --enable-monitoring -o native-server
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          path: native-tmp/*

name: Build Minecraft Fat Jar

on:
  workflow_dispatch: # 手动触发构建

env:
  DOWNLOAD_URL: "你的JAR下载链接" # 替换成你提到的已知链接

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 # 现代MC版本建议使用21
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download and Extract Server Jar
        run: |
          mkdir -p build/libs/libraries
          curl -L -o server-bundler.jar ${{ env.DOWNLOAD_URL }}
          
          # 解压外层 JAR
          unzip server-bundler.jar -d temp_extracted/
          
          # 1. 提取库文件 (根据 Bundler 结构，库通常在 META-INF/libraries)
          if [ -d "temp_extracted/META-INF/libraries" ]; then
            cp -r temp_extracted/META-INF/libraries/* build/libs/libraries/
          fi
          
          # 2. 获取主类 (Main-Class)
          MAIN_CLASS=$(cat temp_extracted/META-INF/main-class)
          echo "Main Class detected: $MAIN_CLASS"
          
          # 3. 处理版本相关的 server jar (针对 1.18+ 的 bundler 结构)
          # 提取真正的 server 核心 jar
          cp temp_extracted/META-INF/versions/*/*.jar build/libs/libraries/server-core.jar || true
          
          # 将主类写入 gradle 属性供后续使用 (如果需要动态修改)
          echo "mainClassName=$MAIN_CLASS" >> $GITHUB_ENV

      - name: Build Fat Jar with Gradle Shadow
        run: |
          # 使用 shadowJar 命令进行合并与冲突处理
          # 我们在 build.gradle 里已经定义了合并逻辑
          gradle shadowJar

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Fat-Jar
          path: build/libs/Minecraft-Server-Fat.jar

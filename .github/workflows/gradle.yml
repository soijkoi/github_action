name: Build Minecraft Fat-Jar (GradleUp Shadow)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      jar_url:
        description: 'Minecraft Server Jar Download Link'
        required: true
        default: https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar
  
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Extract Metadata
        run: |
          mkdir -p build-tmp
          cd build-tmp
          curl -L "https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar" -o server.jar
          jar -xf server.jar
          winget install --id Microsoft.VisualStudio.2022.BuildTools --source winget
        
      - name: Build Fat Jar
        run: gradle nativeCompile --no-daemon --parallel --info

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: output.zip
          path: build/*

name: Build Minecraft Native Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      jar_url:
        description: 'Minecraft Server Jar Download Link'
        required: true
        default: https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar
  
jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
      
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.2'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        run: |
          mkdir build-tmp
          mkdir native-tmp
          cd build-tmp
          curl -s -L "https://piston-data.mojang.com/v1/objects/3ca78d5068bf9b422f694d3f0820e289581c0f0d/server.jar" -o server.jar
          jar -xf server.jar
        
      - name: Build Fat Jar
        run: gradle shadowJar --no-daemon --parallel
        
      - name: Generate Native Image Configuration with Agent
        shell: powershell
        run: |
          cd native-tmp
          Write-Host "Starting Minecraft server with native-image-agent..."
          echo eula=true > eula.txt
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = "java"
          $psi.Arguments = "-agentlib:native-image-agent=config-output-dir=./native-config -jar ../build/libs/server-fat.jar"
          $psi.RedirectStandardInput = $true
          $psi.UseShellExecute = $false
          $psi.WorkingDirectory = Get-Location
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $psi
          $process.Start() | Out-Null
          
          Write-Host "Waiting for server to initialize (15 seconds)..."
          Start-Sleep -Seconds 15
          
          Write-Host "Sending 'stop' command to gracefully shut down..."
          $process.StandardInput.WriteLine("stop")com
          $process.StandardInput.Close()
          
          $process.WaitForExit(30000) | Out-Null
          if ($process.ExitCode -ne 0) {
              Write-Host "Server exited with code $($process.ExitCode)"
              exit $process.ExitCode
          }
          
          Write-Host "Configuration files generated in ./native-config:"
          Get-ChildItem ./native-config
      - name: Build Native Image
        run: |
            cd native-tmp
            native-image -jar ../build/libs/server-fat.jar -o native-server  --initialize-at-build-time=org.apache.logging.slf4j,org.apache.logging.log4j --initialize-at-run-time=io.netty,joptsimple --enable-monitoring=all --no-fallback --enable-https --enable-http --future-defaults=all --enable-preview -march=skylake -Os --static-nolibc --enable-native-access ALL-UNNAMED -J-XX:-ExitOnOutOfMemoryError -H:+UnlockExperimentalVMOptions -J-Xmx17g -H:-DeadlockWatchdogExitOnTimeout -H:Preserve=package=com.*,net.*,oshi.*,joptsimple.*
            
      - uses: actions/upload-artifact@v6
        with:
          path: native-tmp/*
